<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Камеры на карте</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
        }
        #map {
            width: 100%;
            height: 100%;
        }
        
        /* Нижняя информационная панель */
        .info-panel {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            color: white;
            padding: 14px 20px;
            border-radius: 16px;
            font-size: 14px;
            z-index: 1000;
            text-align: left;
            max-width: 420px;
            margin: 0 auto;
            font-family: monospace;
            pointer-events: none;
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.2s ease;
            word-break: break-word;
            white-space: pre-line;
            line-height: 1.4;
        }
        .loading {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            color: #ffaa44;
            padding: 8px 16px;
            border-radius: 24px;
            font-size: 12px;
            z-index: 1000;
            font-family: monospace;
        }
        .counter {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            color: white;
            padding: 8px 16px;
            border-radius: 24px;
            font-size: 13px;
            z-index: 1000;
            font-family: monospace;
        }
        .refresh-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000;
            font-size: 20px;
            transition: transform 0.2s;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .refresh-btn:hover {
            transform: rotate(90deg);
            background: rgba(0, 0, 0, 0.9);
        }
        @media (max-width: 600px) {
            .info-panel { font-size: 12px; padding: 10px 16px; bottom: 15px; }
            .counter, .loading { font-size: 10px; padding: 6px 12px; }
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="loading" id="loadingStatus">🔄 Загрузка...</div>
    <div class="counter" id="counter">📍 0</div>
    <div class="refresh-btn" id="refreshBtn" title="Обновить данные">⟳</div>
    <div class="info-panel" id="infoPanel">📍 Наведите на маркер или кликните</div>

    <script>
        // ==================== КОНФИГУРАЦИЯ ====================
        const YANDEX_API_KEY = '0c8158f3-19bb-4894-a380-7a632583d6d4';
        
        // Токен для чтения
        const AIRTABLE_READ_TOKEN = 'patQti35eE2qFQYKK.fdd589ae9c5b728679a0bdc3f82fc98371601bb5b7b6310a10f4093f4219f8be';
        
        const BASE_ID = 'appSQMpP8Kh4i466S';
        const TABLE_ID = 'tbl70cRzDcyF5l6po';
        // ===================================================
        
        let currentMap = null;
        let currentMarkers = [];
        
        const loadingDiv = document.getElementById('loadingStatus');
        const counterDiv = document.getElementById('counter');
        const infoPanel = document.getElementById('infoPanel');
        const refreshBtn = document.getElementById('refreshBtn');
        
        function updateStatus(message, isError = false) {
            loadingDiv.innerHTML = isError ? `❌ ${message}` : `🔄 ${message}`;
            loadingDiv.style.background = isError ? 'rgba(220, 53, 69, 0.9)' : 'rgba(0, 0, 0, 0.7)';
            console.log(`[STATUS] ${message}`);
        }
        
        function updateInfo(message, isError = false) {
            infoPanel.innerHTML = message;
            infoPanel.style.background = isError ? 'rgba(220, 53, 69, 0.9)' : 'rgba(0, 0, 0, 0.85)';
        }
        
        function updateCount(count) {
            counterDiv.innerHTML = `📍 ${count}`;
        }
        
        // Парсинг координат "широта,долгота" → [долгота, широта]
        function parseCoordinates(coordString) {
            if (!coordString || typeof coordString !== 'string') return null;
            const cleaned = coordString.trim().replace(/\s/g, '');
            const parts = cleaned.split(',');
            if (parts.length !== 2) return null;
            const lat = parseFloat(parts[0]);
            const lng = parseFloat(parts[1]);
            if (isNaN(lat) || isNaN(lng)) return null;
            if (lat < -90 || lat > 90) return null;
            if (lng < -180 || lng > 180) return null;
            return [lng, lat];
        }
        
        // Загрузка данных из Airtable
        async function fetchFromAirtable() {
            const url = `https://api.airtable.com/v0/${BASE_ID}/${TABLE_ID}?sort[0][field]=Name&sort[0][direction]=asc`;
            
            updateStatus('Загрузка данных...');
            
            try {
                const response = await fetch(url, {
                    headers: {
                        'Authorization': `Bearer ${AIRTABLE_READ_TOKEN}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                console.log('Airtable ответ:', data);
                
                const points = [];
                
                for (const record of data.records) {
                    const fields = record.fields;
                    const coordinatesRaw = fields['Coordinates'];
                    const coordinates = parseCoordinates(coordinatesRaw);
                    
                    if (coordinates) {
                        points.push({
                            id: record.id,
                            coordinates: coordinates,
                            title: fields['Name'] || 'Без названия',
                            description: fields['Description'] || '',
                            entryDate: fields['Entry Date'] || '',
                            source: fields['Source'] || ''
                        });
                        console.log(`✅ ${points[points.length-1].title}`);
                    } else {
                        console.warn(`⚠️ Пропущен: ${fields['Name'] || record.id} (координаты: "${coordinatesRaw}")`);
                    }
                }
                
                console.log(`📊 Итого: ${points.length} из ${data.records.length} объектов`);
                updateInfo(`📊 Загружено: ${points.length} объектов. Наведите на маркер.`);
                updateCount(points.length);
                
                return points;
                
            } catch (error) {
                console.error('Ошибка Airtable:', error);
                updateInfo(`❌ Ошибка: ${error.message}`, true);
                return [];
            }
        }
        
        // Расчёт центра и масштаба
        function calculateViewport(points) {
            if (!points || points.length === 0) {
                return { center: [37.573856, 55.751574], zoom: 10 };
            }
            
            let minLng = Infinity, maxLng = -Infinity;
            let minLat = Infinity, maxLat = -Infinity;
            
            points.forEach(point => {
                const [lng, lat] = point.coordinates;
                minLng = Math.min(minLng, lng);
                maxLng = Math.max(maxLng, lng);
                minLat = Math.min(minLat, lat);
                maxLat = Math.max(maxLat, lat);
            });
            
            const centerLng = (minLng + maxLng) / 2;
            const centerLat = (minLat + maxLat) / 2;
            const center = [centerLng, centerLat];
            
            const lngDiff = maxLng - minLng;
            const latDiff = maxLat - minLat;
            const maxDiff = Math.max(lngDiff, latDiff);
            
            let zoom = 10;
            if (maxDiff <= 0.0005) zoom = 19;
            else if (maxDiff <= 0.001) zoom = 18;
            else if (maxDiff <= 0.002) zoom = 17;
            else if (maxDiff <= 0.005) zoom = 16;
            else if (maxDiff <= 0.01) zoom = 15;
            else if (maxDiff <= 0.02) zoom = 14;
            else if (maxDiff <= 0.05) zoom = 13;
            else if (maxDiff <= 0.1) zoom = 12;
            else if (maxDiff <= 0.2) zoom = 11;
            else if (maxDiff <= 0.5) zoom = 10;
            else if (maxDiff <= 1) zoom = 9;
            else if (maxDiff <= 2) zoom = 8;
            else zoom = 7;
            
            console.log(`📐 Масштаб: ${zoom}`);
            return { center, zoom };
        }
        
        // Создание маркера
        function createMarker(point) {
            const container = document.createElement('div');
            container.style.cssText = `
                display: flex;
                align-items: center;
                justify-content: center;
                width: 38px;
                height: 38px;
                transform: translate(-50%, -50%);
                cursor: pointer;
                filter: drop-shadow(0 2px 6px rgba(0,0,0,0.3));
                transition: transform 0.2s;
            `;
            
            const icon = document.createElement('div');
            icon.innerHTML = '📹';
            icon.style.cssText = `
                font-size: 28px;
                width: 38px;
                height: 38px;
                display: flex;
                align-items: center;
                justify-content: center;
                background: white;
                border-radius: 50%;
                border: 2px solid #ff4444;
                box-shadow: 0 2px 8px rgba(0,0,0,0.2);
                transition: all 0.2s;
            `;
            
            container.appendChild(icon);
            
            // Форматируем данные
            const title = point.title;
            const description = point.description || "—";
            const dateStr = point.entryDate || "—";
            const sourceStr = point.source || "—";
            
            // Три строки: название, описание, дата и источник
            const fullInfo = `${title}\n${description}\n📅 ${dateStr} | 👤 ${sourceStr}`;
            
            container.addEventListener('mouseenter', () => {
                updateInfo(fullInfo);
                icon.style.border = '3px solid #ff8888';
                icon.style.transform = 'scale(1.05)';
                container.style.transform = 'translate(-50%, -50%) scale(1.05)';
            });
            
            container.addEventListener('mouseleave', () => {
                icon.style.border = '2px solid #ff4444';
                icon.style.transform = 'scale(1)';
                container.style.transform = 'translate(-50%, -50%) scale(1)';
            });
            
            container.addEventListener('click', (e) => {
                e.stopPropagation();
                updateInfo(fullInfo);
                alert(`${title}\n\nОписание: ${description}\n\nДата: ${dateStr}\nИсточник: ${sourceStr}`);
            });
            
            const marker = new ymaps3.YMapMarker(
                { coordinates: point.coordinates },
                container
            );
            
            return marker;
        }
        
        // Отрисовка карты
        async function renderMap(points) {
            if (!currentMap) {
                const viewport = calculateViewport(points);
                currentMap = new ymaps3.YMap(document.getElementById('map'), {
                    location: { center: viewport.center, zoom: viewport.zoom }
                });
                currentMap.addChild(new ymaps3.YMapDefaultSchemeLayer());
                currentMap.addChild(new ymaps3.YMapDefaultFeaturesLayer({ zIndex: 1800 }));
            } else {
                const viewport = calculateViewport(points);
                currentMap.update({ location: { center: viewport.center, zoom: viewport.zoom } });
            }
            
            // Удаляем старые маркеры
            currentMarkers.forEach(marker => {
                if (marker && currentMap.removeChild) currentMap.removeChild(marker);
            });
            currentMarkers = [];
            
            // Добавляем новые маркеры
            for (const point of points) {
                const marker = createMarker(point);
                currentMap.addChild(marker);
                currentMarkers.push(marker);
            }
            
            window.pointsCount = points.length;
            updateStatus(`✅ ${points.length} объектов на карте`);
            if (points.length > 0) {
                updateInfo(`📍 ${points.length} объектов. Наведите на маркер для информации.`);
            } else {
                updateInfo(`⚠️ Нет объектов с координатами`, true);
            }
        }
        
        // Основная загрузка
        async function loadAndDisplay() {
            updateStatus('Загрузка данных...');
            const points = await fetchFromAirtable();
            if (points.length === 0) {
                updateStatus('Нет данных', true);
                updateInfo('⚠️ Объекты не найдены. Проверьте Airtable', true);
                return;
            }
            await renderMap(points);
        }
        
        // Инициализация Яндекс.Карт
        function initYandexAPI() {
            return new Promise((resolve, reject) => {
                if (window.ymaps3) { resolve(); return; }
                const script = document.createElement('script');
                script.src = `https://api-maps.yandex.ru/v3/?apikey=${YANDEX_API_KEY}&lang=ru_RU`;
                script.onload = () => { ymaps3.ready.then(resolve).catch(reject); };
                script.onerror = () => reject(new Error('Не удалось загрузить API Яндекс.Карт'));
                document.head.appendChild(script);
            });
        }
        
        // Запуск
        async function start() {
            updateStatus('Инициализация...');
            try {
                await initYandexAPI();
                await loadAndDisplay();
                refreshBtn.onclick = () => {
                    updateStatus('Обновление...');
                    loadAndDisplay();
                };
            } catch (error) {
                console.error('Ошибка:', error);
                updateStatus('Ошибка инициализации', true);
                updateInfo(`❌ ${error.message}`, true);
            }
        }
        
        start();
    </script>
</body>
</html>
