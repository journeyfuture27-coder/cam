<!DOCTYPE html>
<html>
<head><title>Диагностика Airtable</title></head>
<body>
<pre id="output">Загрузка...</pre>
<script>
const AIRTABLE_READ_TOKEN = 'patQti35eE2qFQYKK.fdd589ae9c5b728679a0bdc3f82fc98371601bb5b7b6310a10f4093f4219f8be';
const BASE_ID = 'appSQMpP8Kh4i466S';
const TABLE_ID = 'tbl70cRzDcyF5l6po';

fetch(`https://api.airtable.com/v0/${BASE_ID}/${TABLE_ID}?maxRecords=3`, {
    headers: { 'Authorization': `Bearer ${AIRTABLE_READ_TOKEN}` }
})
.then(r => r.json())
.then(data => {
    const out = document.getElementById('output');
    if (data.records && data.records[0]) {
        const fields = data.records[0].fields;
        out.textContent = "Имена полей:\n" + Object.keys(fields).join("\n");
        out.textContent += "\n\nЗначения полей:\n" + JSON.stringify(fields, null, 2);
    } else {
        out.textContent = "Ошибка или нет записей:\n" + JSON.stringify(data, null, 2);
    }
})
.catch(e => out.textContent = "Ошибка: " + e.message);
</script>
</body>
</html>
